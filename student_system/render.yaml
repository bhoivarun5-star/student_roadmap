databases:
  - name: student-portal-db
    databaseName: student_portal
    user: portal_admin
    plan: free

services:
  - type: web
    name: student-skill-portal-api
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn student_system.wsgi:application
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: student-portal-db
          property: connectionString
